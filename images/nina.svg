<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c5a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="300" height="300" rx="150" fill="url(#bg)" filter="url(#shadow)"/>
  <text x="150" y="165" text-anchor="middle" font-family="Noto Sans JP, Microsoft YaHei, sans-serif"
        font-size="100" font-weight="900" fill="white">仁菜</text>
  <circle cx="150" cy="150" r="145" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
</svg>