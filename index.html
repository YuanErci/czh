*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {

.petal {

}
@keyframes fall {

  50%  { opacity: 0.5; }
  100% { transform: translateY(105vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* ===== 主容器 ===== */
.container {
  position: relative; z-index: 1;
  width: 90%; max-width: 520px;

}

  text-align: center; margin-bottom: 12px;
}

  font-family: 'Noto Sans JP', 'PingFang SC', 'Microsoft YaHei', sans-serif;

  background: linear-gradient(135deg, #e91e63, #9c27b0, #3f51b5);

}

.btn-primary {

// ==================== 樱花动画 ====================
function createPetals() {
  const container = document.getElementById('petals');
  const petalEmojis = ['🌸','🍂','💮','🌺','🍃'];
  for (let i = 0; i < 30; i++) {
    const petal = document.createElement('span');
    petal.className = 'petal';
    petal.textContent = petalEmojis[i % petalEmojis.length];
    petal.style.left = Math.random() * 100 + '%';
    petal.style.fontSize = (16 + Math.random() * 22) + 'px';
    petal.style.animationDuration = (8 + Math.random() * 14) + 's';
    petal.style.animationDelay = (Math.random() * 12) + 's';
    petal.style.opacity = (0.3 + Math.random() * 0.5);
    container.appendChild(petal);
  }
}
createPetals();

// ==================== 核心逻辑 ====================

// 构建加权数组：MyGO!!!!! / Ave Mujica / Pastel*Palettes / トゲナシトゲアリ 概率翻倍
const BOOST_BANDS = ['MyGO!!!!!', 'Ave Mujica', 'Pastel*Palettes', 'トゲナシトゲアリ'];
const BOOST_WEIGHT = 2; // 翻倍权重
const weightedIndices = [];
members.forEach((m, i) => {
  const weight = BOOST_BANDS.includes(m.band) ? BOOST_WEIGHT : 1;
  for (let j = 0; j < weight; j++) {
    weightedIndices.push(i);
  }
});
const WEIGHTED_TOTAL = weightedIndices.length; // 81（41普通 + 20×2高权重）

function getIndex(name) {
  let sum = 0;
  for (let i = 0; i < name.length; i++) {
    sum += name.charCodeAt(i);
  }
  return weightedIndices[sum % WEIGHTED_TOTAL];
}

function doTest() {
  const input = document.getElementById('nameInput');
  const name = input.value.trim();
  if (!name) {
    input.focus();
    input.style.borderColor = '#f44336';
    input.style.boxShadow = '0 0 0 4px rgba(244,67,54,0.2)';
    setTimeout(() => {
      input.style.borderColor = '#e1bee7';
      input.style.boxShadow = 'none';
    }, 1500);
    return;
  }
  // 特殊检测：circle缘 任意大小写 → 创始者页面
  if (isFounderName(name)) {
    showFounderResult(name);
    return;
  }
  showResult(getIndex(name));
}

// 检测是否为 "circle缘" 的任意大小写组合
function isFounderName(name) {
  // 去掉中间可能的空格，统一小写
  const cleaned = name.replace(/\s+/g, '').toLowerCase();
  // 匹配 "circle" + "缘" (或繁体"緣")
  return /^circle[缘緣]$/.test(cleaned);
}

function doRandom() {
  const randomIndex = Math.floor(Math.random() * TOTAL);
  document.getElementById('nameInput').value = '🎲 随机生成';
  showResult(randomIndex);
}

function showResult(index) {
  const m = members[index];
  const card = document.getElementById('resultCard');

  // 设置 CSS 变量
  card.style.setProperty('--band-color', m.color);

  // 填充数据
  const imgEl = document.getElementById('avatarImg');
  const fallbackEl = document.getElementById('avatarFallback');
  if (m.img) {
    imgEl.src = m.img;
    imgEl.style.display = 'block';
    fallbackEl.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
    fallbackEl.style.display = 'block';
    fallbackEl.textContent = m.emoji;
  }
  document.getElementById('memberName').textContent = m.name;
  document.getElementById('memberRole').textContent = m.role;
  document.getElementById('memberRole').style.background = m.color;
  document.getElementById('bandName').textContent = '🎸 ' + m.band;
  document.getElementById('bandName').style.color = m.color;
  document.getElementById('memberIntro').textContent = m.intro;
  document.getElementById('bandSong').textContent = m.song;

  // 显示卡片（触发动画）
  card.classList.remove('show');
  void card.offsetWidth; // 强制重排以重新触发动画
  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetTest() {
  document.getElementById('nameInput').value = '';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('nameInput').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyResult() {
  const mName = document.getElementById('memberName').textContent;
  const mBand = document.getElementById('bandName').textContent;
  const mRole = document.getElementById('memberRole').textContent;
  const mSong = document.getElementById('bandSong').textContent;

  const text = `✨ 看看你和谁的匹配度最高！✨\n\n🎤 你是：${mName}\n🎵 担当：${mRole}\n🎸 所属：${mBand}\n🎼 代表曲：${mSong}\n\n快来测测你和哪个二次元乐队成员匹配度最高吧！`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      alert('✅ 结果已复制到剪贴板！分享给朋友吧~');
    });
  } else {
    // 降级方案
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('✅ 结果已复制到剪贴板！分享给朋友吧~');
  }
}

// ==================== 键盘事件 ====================
document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doTest();
